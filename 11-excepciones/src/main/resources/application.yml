# application.yml del módulo 11.
# Hardening estándar: nunca exponer stacktrace ni cabeceras de servidor.
server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false
  server-header: ""

spring:
  application:
    name: excepciones

logging:
  level:
    root: INFO
    com.springroadmap: DEBUG

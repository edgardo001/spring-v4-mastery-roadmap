# Modulo 44 - nginx sirve los estaticos de Angular y proxy_pass /api al backend.
# Con esto en produccion NO hay CORS (todo se ve como mismo origen desde el navegador).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: cualquier ruta no encontrada sirve index.html para que
    # Angular Router maneje el enrutamiento client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend: /api/* -> http://backend:8080/api/*
    # "backend" es el nombre del servicio en docker-compose (DNS interno de Docker).
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

spring:
  application:
    name: spring-data-rest
  datasource:
    url: jdbc:h2:mem:datarest;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false
  sql:
    init:
      mode: always
  data:
    rest:
      base-path: /api
      default-page-size: 20

server:
  port: 8080

logging:
  level:
    org.springframework.data.rest: INFO

# =========================================================
# Modulo 48 - helm/values.yaml
# =========================================================
# Valores parametricos que consume templates/deployment.yaml.
# Se sobreescriben en tiempo de "helm install" con --set o -f.
# =========================================================
replicaCount: 2

image:
  repository: kubernetes-demo
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 10
    periodSeconds: 5

springProfilesActive: "prod"

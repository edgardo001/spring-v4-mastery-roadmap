# application.yml — Módulo 23 (WebSocket + STOMP)
# Se sirve el endpoint de handshake WebSocket en http://localhost:8080/ws
server:
  port: 8080

spring:
  application:
    name: websocket

# Logging útil para depurar el broker STOMP en desarrollo.
# En producción se bajaría a WARN.
logging:
  level:
    org.springframework.web.socket: INFO
    org.springframework.messaging: INFO

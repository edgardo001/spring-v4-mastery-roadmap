# Configuración por defecto: H2 en memoria.
# Nos permite ejecutar el JAR (`java -jar ...`) SIN necesidad de Docker ni Postgres instalado.
# Los tests de Testcontainers sobrescriben spring.datasource.* dinámicamente con @DynamicPropertySource.
spring:
  datasource:
    url: jdbc:h2:mem:booksdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      # 'update' es cómodo en aprendizaje. En producción real se usaría 'validate' + Flyway (ver módulo 08).
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true

server:
  port: 8080

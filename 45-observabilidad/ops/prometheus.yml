# Config minima de Prometheus para scrapear la app modulo 45.
# En Windows/Mac con Docker Desktop, host.docker.internal apunta al host.
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'observabilidad'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']

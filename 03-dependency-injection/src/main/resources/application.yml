# application.yml del módulo 03. Reutiliza el hardening del módulo 02
# (recomendación del agente de Seguridad: no repetir configuración distinta).
server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false
  server-header: ""

spring:
  application:
    name: dependency-injection

logging:
  level:
    root: INFO
    com.springroadmap: DEBUG
